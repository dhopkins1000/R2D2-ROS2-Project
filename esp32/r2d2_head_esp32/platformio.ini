; ============================================================
; R2D2 Head ESP32 – PlatformIO Config
; Board: LOLIN D1 Mini ESP32
; micro-ROS Transport: USB Serial (/dev/ttyACM1)
;
; Library: prebuilt libmicroros.a aus micro_ros_arduino v2.0.8-jazzy
; Vorbereitung: bash scripts/build_microros_lib.sh
; ============================================================

[env:lolin_d32]
platform = espressif32
board = lolin_d32
framework = arduino

; Prebuilt micro-ROS Library einbinden
build_flags =
    -L ${PROJECT_DIR}/lib/microros
    -l microros
    -I ${PROJECT_DIR}/lib/microros/include
    -DMICRO_ROS_TRANSPORT_ARDUINO_SERIAL

; micro-ROS braucht mehr Flash
board_build.partitions = huge_app.csv

; Serial Monitor
monitor_speed = 115200
