; ============================================================
; R2D2 Chassis ESP32 – PlatformIO Config
; Board: LOLIN D32 (ESP32)
; micro-ROS Transport: USB Serial
;
; MICRO-ROS BUILD STRATEGY (ARM64/Jazzy workaround):
;   Statt Source-Build (der auf ARM64 scheitert) wird eine
;   prebuilt static library verwendet.
;   → Zuerst scripts/build_microros_lib.sh auf dem Pi ausführen!
;   → Die Library landet dann in lib/microros/
; ============================================================

[env:lolin_d32]
platform = espressif32
board = lolin_d32
framework = arduino

; --- micro-ROS: prebuilt static library ---
; Pfad zur selbst gebauten libmicroros.a (nach build_microros_lib.sh)
build_flags =
    -L ${PROJECT_DIR}/lib/microros
    -l microros
    -I ${PROJECT_DIR}/lib/microros/include
    -DMICRO_ROS_TRANSPORT_ARDUINO_SERIAL

; Mehr Flash – micro-ROS braucht das
board_build.partitions = huge_app.csv

; Serial Monitor
monitor_speed = 115200
