; ============================================================
; R2D2 Chassis ESP32 – PlatformIO Config
; Board: LOLIN D32 (ESP32)
; micro-ROS Transport: USB Serial
;
; Library: prebuilt libmicroros.a aus micro_ros_arduino v2.0.8-jazzy
; Vorbereitung: bash scripts/build_microros_lib.sh
; ============================================================

[env:lolin_d32]
platform = espressif32
board = lolin_d32
framework = arduino

; Prebuilt micro-ROS Library einbinden
build_flags =
    -L ${PROJECT_DIR}/lib/microros
    -l microros
    -I ${PROJECT_DIR}/lib/microros/include
    -DMICRO_ROS_TRANSPORT_ARDUINO_SERIAL

; micro-ROS braucht mehr Flash
board_build.partitions = huge_app.csv

; OLED Libraries
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9

; Serial Monitor
monitor_speed = 115200
