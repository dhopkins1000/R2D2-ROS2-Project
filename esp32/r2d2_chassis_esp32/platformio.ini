; ============================================================
; R2D2 Chassis ESP32 – PlatformIO Config
; Board: LOLIN D32 (ESP32)
; micro-ROS Transport: USB Serial
;
; micro-ROS wird von micro_ros_platformio gebaut.
; Beim ersten `pio run` lädt PlatformIO die Library herunter
; und baut sie via Docker (muss installiert sein).
; ============================================================

[env:lolin_d32]
platform = espressif32
board = lolin_d32
framework = arduino

; micro-ROS via PlatformIO Library (baut intern via Docker)
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio

; Mehr Flash – micro-ROS braucht das
board_build.partitions = huge_app.csv

; Serial Monitor
monitor_speed = 115200
