# R2D2 Audio Configuration

wake_word:
  ros__parameters:
    threshold: 0.5          # Detection sensitivity (0.0-1.0)
    listen_timeout: 5.0     # Seconds to listen after wake word
    model_path: ''          # Path to custom .onnx wake word model
                            # Empty = use default openWakeWord model
                            # Train custom: https://github.com/dscripka/openWakeWord

whisper:
  ros__parameters:
    model_size: 'tiny'      # tiny (fastest) | base | small (best quality)
    language: 'de'          # de = German, en = English
    record_seconds: 5.0     # Recording window after wake word

respeaker:
  ros__parameters:
    sample_rate: 16000
    processed_channel: 0   # Channel 0 = beamformed DSP output
